name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  app-tests:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run app unit tests with coverage
        run: |
          xcodebuild \
            -project KeyVox.xcodeproj \
            -scheme "KeyVox DEBUG" \
            -configuration Debug \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -resultBundlePath /tmp/keyvox-tests.xcresult \
            test

      - name: Enforce core coverage
        run: Tools/Quality/check_core_coverage.sh /tmp/keyvox-tests.xcresult

  pronunciation-quality:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run pronunciation quality gates
        run: Tools/Pronunciation/benchmarks/run_quality_gates.sh --repo-root "$GITHUB_WORKSPACE"

  package-tests:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run KeyVoxWhisper package tests
        run: swift test --package-path Packages/KeyVoxWhisper
