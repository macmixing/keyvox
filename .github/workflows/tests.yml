name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  app-tests:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run app unit tests with coverage
        run: |
          xcodebuild \
            -project macOS/KeyVox.xcodeproj \
            -scheme "KeyVox DEBUG" \
            -configuration Debug \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -resultBundlePath /tmp/keyvox-tests.xcresult \
            test

      - name: Publish coverage summary
        run: |
          Tools/Quality/coverage_summary.sh /tmp/keyvox-tests.xcresult >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce app-owned core coverage
        run: Tools/Quality/check_core_coverage.sh /tmp/keyvox-tests.xcresult

  ios-app-tests:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run iOS unit tests
        run: |
          xcodebuild \
            -project "iOS/KeyVox iOS.xcodeproj" \
            -scheme "KeyVox iOS DEBUG" \
            -configuration Debug \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -resultBundlePath /tmp/keyvox-ios-tests.xcresult \
            test

  pronunciation-quality:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run pronunciation quality gates
        run: Tools/Pronunciation/benchmarks/run_quality_gates.sh --repo-root "$GITHUB_WORKSPACE"

  package-tests:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run KeyVoxWhisper package tests
        run: swift test --package-path Packages/KeyVoxWhisper

      - name: Run KeyVoxCore package tests with coverage
        id: keyvoxcore-tests
        run: |
          swift test --package-path Packages/KeyVoxCore --enable-code-coverage
          coverage_path="$(find Packages/KeyVoxCore/.build -path '*/codecov/KeyVoxCore.json' -print -quit)"
          if [[ -z "$coverage_path" ]]; then
            echo "error: unable to locate KeyVoxCore coverage json" >&2
            exit 1
          fi
          echo "coverage_path=$coverage_path" >> "$GITHUB_OUTPUT"

      - name: Publish KeyVoxCore coverage summary
        run: |
          Tools/Quality/keyvoxcore_coverage_summary.sh "${{ steps.keyvoxcore-tests.outputs.coverage_path }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce KeyVoxCore coverage
        run: Tools/Quality/check_keyvoxcore_coverage.sh "${{ steps.keyvoxcore-tests.outputs.coverage_path }}"
